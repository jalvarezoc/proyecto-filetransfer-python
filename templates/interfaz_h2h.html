<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generar documentos H2H</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      min-height: 100%;
    }
    body {
      background: linear-gradient(180deg, #f6f2eb 0%, #ece6dc 100%);
      color: #2d241b;
    }
    .app-shell {
      max-width: 1180px;
    }
    .page-card {
      background: rgba(255, 252, 247, 0.92);
      border: 1px solid #dbcdbd;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 14px 40px rgba(81, 60, 31, 0.10);
    }
    .generator-section {
      background: #fffdf9;
      border: 1px solid #e6dacb;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .section-counter {
      font-size: 0.84rem;
      color: #7a6852;
      font-weight: 600;
    }
    .form-label,
    .table-label {
      font-size: 0.82rem;
      margin-bottom: 6px;
      font-weight: 700;
      color: #5a4934;
    }
    .form-control, .form-select {
      min-height: 42px;
      border-radius: 10px;
      border-color: #d8c8b7;
      font-size: 0.92rem;
    }
    .table-scroll {
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .users-grid {
      min-width: 980px;
    }
    .users-grid .grid-header,
    .users-grid .grid-row {
      display: grid;
      grid-template-columns: 1.2fr 1.2fr 1.2fr 1.35fr 1.35fr 0.7fr;
      gap: 12px;
      align-items: center;
    }
    .users-grid .grid-header {
      padding: 0 6px 8px;
      border-bottom: 1px solid #e9dece;
      margin-bottom: 10px;
      min-width: 980px;
    }
    .users-grid .grid-row {
      padding: 8px 6px;
      border-bottom: 1px solid #f0e6d9;
    }
    .users-grid .grid-row:last-child {
      border-bottom: none;
    }
    .grid-action {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .btn-duplicate-user {
      min-width: 36px;
      height: 36px;
      border: 1px solid #c9b89f;
      border-radius: 10px;
      background: #f7efe3;
      color: #6b4b23;
      font-weight: 700;
      line-height: 1;
    }
    .btn-duplicate-user:hover {
      background: #efdfc7;
    }
    .btn-add-user {
      width: 100%;
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid #cfbea9;
      background: #fff;
      color: #3f3123;
      font-weight: 700;
    }
    .btn-add-user:hover {
      background: #f8efe4;
    }
    .btn-generate {
      background-color: #8c2f1c;
      color: #fff;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      min-height: 46px;
      width: 100%;
    }
    .btn-generate:hover {
      background-color: #6f2213;
      color: #fff;
    }
    .btn-back {
      min-height: 46px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.92rem;
      font-weight: 700;
    }
    .btn-remove-user {
      width: 36px;
      height: 36px;
      border: 1px solid #dcbfb1;
      border-radius: 10px;
      background: #fff7f5;
      color: #a22c29;
      font-weight: 700;
      line-height: 1;
    }
    .btn-remove-user:hover {
      background: #fbe4df;
    }
    h2 {
      font-size: 1.65rem;
      margin-bottom: 16px;
    }
    h5 {
      font-size: 1.02rem;
      margin: 0;
      font-weight: 700;
    }
    #mensajes .alert {
      margin-bottom: 14px;
      padding: 10px 12px;
      font-size: 0.9rem;
      border-radius: 10px;
    }
    .d-none {
      display: none !important;
    }
    @media (max-width: 991.98px) {
      .page-card {
        padding: 16px;
      }
      .generator-section {
        padding: 16px;
      }
      .users-grid {
        min-width: 920px;
      }
    }
  </style>
</head>
<body>
  <div class="container app-shell py-4">
    <div class="page-card">
      <h2>Generar documentos H2H</h2>
      <div id="mensajes"></div>

      <form id="sterlingForm">
        <section class="generator-section">
          <div class="section-header">
            <h5>Configuracion inicial</h5>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="tipoDocumento">Tipo de documento</label>
              <select class="form-select" id="tipoDocumento" required>
                <option value="">Seleccionar...</option>
                <option value="PGP_RENOVACION" selected>RENOVACION DE CERTIFICADO PGP</option>
                <option value="OPENSSL_RENOVACION">RENOVACION DE CERTIFICACION OPENSSL</option>
                <option value="CAMBIO_CREDENCIALES">CAMBIO DE CREDENCIALES</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="nombreMVP">Nombre OCD</label>
              <input type="text" class="form-control" id="nombreMVP" placeholder="Nombre del OCD" required>
            </div>
          </div>
        </section>

        <section class="generator-section d-none" id="seccionUsuarios">
          <div class="section-header">
            <h5>Usuarios</h5>
            <span class="section-counter" id="contadorUsuarios">1 usuario</span>
          </div>

          <div class="table-scroll">
            <div class="users-grid">
              <div class="grid-header">
                <div class="table-label">Empresa</div>
                <div class="table-label">Usuario FT</div>
                <div class="table-label">Certificado</div>
                <div class="table-label">Fecha vencimiento</div>
                <div class="table-label">Fecha anterior</div>
                <div class="table-label text-center">Accion</div>
              </div>
              <div id="usuariosRows"></div>
            </div>
          </div>

          <button type="button" class="btn btn-add-user mt-3" id="btnAgregarUsuario">+ Agregar usuario</button>
        </section>

        <section class="generator-section" id="seccionDatosBase">
          <div class="section-header">
            <h5>Datos base</h5>
          </div>
          <div class="row g-3">
            <div class="col-md-6" id="contenedorNombreEmpresa">
              <label class="form-label" for="nombreEmpresa">Nombre Empresa</label>
              <input type="text" class="form-control" id="nombreEmpresa">
            </div>
            <div class="col-md-6" id="contenedorNombreUsuario">
              <label class="form-label" for="nombreUsuario">Nombre Usuario FT</label>
              <input type="text" class="form-control" id="nombreUsuario">
            </div>
            <div class="col-md-6" id="contenedorNombreCertificado">
              <label class="form-label" for="nombreCertificado">Nombre Certificado</label>
              <input type="text" class="form-control" id="nombreCertificado">
            </div>
          </div>
        </section>

        <div class="row g-3">
          <div class="col-md-6">
            <button type="submit" class="btn btn-generate" id="btnGenerar">Generar Word</button>
          </div>
          <div class="col-md-6">
            <a href="{{ url_for('index') }}" class="btn btn-secondary btn-back w-100">Volver al menu principal</a>
          </div>
        </div>
      </form>
    </div>
  </div>

  <template id="usuarioRowTemplate">
    <div class="grid-row usuario-row">
      <div><input type="text" class="form-control empresa-input" placeholder="Empresa"></div>
      <div><input type="text" class="form-control usuario-input" placeholder="Usuario FT"></div>
      <div><input type="text" class="form-control certificado-input" placeholder="Certificado"></div>
      <div><input type="date" class="form-control fecha-vencimiento-input"></div>
      <div><input type="date" class="form-control fecha-anterior-input"></div>
      <div class="grid-action">
        <button type="button" class="btn-duplicate-user" title="Duplicar fila">+</button>
        <button type="button" class="btn-remove-user" title="Eliminar fila">✕</button>
      </div>
    </div>
  </template>

  <script>
    const tipoDocumentoEl = document.getElementById("tipoDocumento");
    const seccionUsuariosEl = document.getElementById("seccionUsuarios");
    const seccionDatosBaseEl = document.getElementById("seccionDatosBase");
    const contenedorNombreEmpresaEl = document.getElementById("contenedorNombreEmpresa");
    const contenedorNombreUsuarioEl = document.getElementById("contenedorNombreUsuario");
    const contenedorNombreCertificadoEl = document.getElementById("contenedorNombreCertificado");
    const usuariosRowsEl = document.getElementById("usuariosRows");
    const contadorUsuariosEl = document.getElementById("contadorUsuarios");
    const mensajesEl = document.getElementById("mensajes");
    const usuarioRowTemplate = document.getElementById("usuarioRowTemplate");

    function mostrarMensaje(tipo, texto) {
      mensajesEl.innerHTML = `
        <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
          ${texto}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      `;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function limpiarValidaciones() {
      document.querySelectorAll("#sterlingForm input, #sterlingForm select").forEach((campo) => {
        campo.classList.remove("is-invalid");
      });
    }

    function actualizarContadorUsuarios() {
      const total = usuariosRowsEl.querySelectorAll(".usuario-row").length;
      contadorUsuariosEl.textContent = `${total} usuario${total === 1 ? "" : "s"}`;
    }

    function marcarInvalido(elemento) {
      if (elemento) {
        elemento.classList.add("is-invalid");
      }
    }

    function tieneLongitudFechaValida(valor) {
      return /^\d{4}-\d{2}-\d{2}$/.test(valor);
    }

    function crearFilaUsuario(valores = {}) {
      const fragment = usuarioRowTemplate.content.cloneNode(true);
      const fila = fragment.querySelector(".usuario-row");
      fila.querySelector(".empresa-input").value = valores.nombreEmpresa || "";
      fila.querySelector(".usuario-input").value = valores.nombreUsuario || "";
      fila.querySelector(".certificado-input").value = valores.nombreCertificado || "";
      fila.querySelector(".fecha-vencimiento-input").value = valores.fechaVencimiento || "";
      fila.querySelector(".fecha-anterior-input").value = valores.fechaVencimientoAnterior || "";

      fila.querySelector(".btn-duplicate-user").addEventListener("click", () => {
        const filaActual = {
          nombreEmpresa: fila.querySelector(".empresa-input").value.trim(),
          nombreUsuario: fila.querySelector(".usuario-input").value.trim(),
          nombreCertificado: fila.querySelector(".certificado-input").value.trim(),
          fechaVencimiento: fila.querySelector(".fecha-vencimiento-input").value,
          fechaVencimientoAnterior: fila.querySelector(".fecha-anterior-input").value
        };
        crearFilaUsuario(filaActual);
      });

      fila.querySelector(".btn-remove-user").addEventListener("click", () => {
        if (usuariosRowsEl.querySelectorAll(".usuario-row").length === 1) {
          fila.querySelectorAll("input").forEach((input) => {
            input.value = "";
            input.classList.remove("is-invalid");
          });
        } else {
          fila.remove();
          actualizarContadorUsuarios();
        }
      });

      usuariosRowsEl.appendChild(fragment);
      actualizarContadorUsuarios();
    }

    function limpiarUsuarios() {
      usuariosRowsEl.innerHTML = "";
      crearFilaUsuario();
    }

    function obtenerUsuarios() {
      return Array.from(usuariosRowsEl.querySelectorAll(".usuario-row")).map((fila) => ({
        nombreEmpresa: fila.querySelector(".empresa-input").value.trim(),
        nombreUsuario: fila.querySelector(".usuario-input").value.trim(),
        nombreCertificado: fila.querySelector(".certificado-input").value.trim(),
        fechaVencimiento: fila.querySelector(".fecha-vencimiento-input").value,
        fechaVencimientoAnterior: fila.querySelector(".fecha-anterior-input").value
      }));
    }

    function ajustarFormularioPorTipo() {
      const tipo = tipoDocumentoEl.value;
      const esRenovacion = tipo === "OPENSSL_RENOVACION" || tipo === "PGP_RENOVACION";
      const esCambioCredenciales = tipo === "CAMBIO_CREDENCIALES";

      seccionUsuariosEl.classList.toggle("d-none", !esRenovacion);
      seccionDatosBaseEl.classList.toggle("d-none", esRenovacion);

      contenedorNombreEmpresaEl.classList.toggle("d-none", esRenovacion);
      contenedorNombreUsuarioEl.classList.toggle("d-none", false);
      contenedorNombreCertificadoEl.classList.toggle("d-none", esCambioCredenciales || esRenovacion);

      document.getElementById("nombreEmpresa").required = esCambioCredenciales;
      document.getElementById("nombreUsuario").required = esCambioCredenciales;
      document.getElementById("nombreCertificado").required = false;

      if (esRenovacion && usuariosRowsEl.children.length === 0) {
        crearFilaUsuario();
      }
    }

    function validarCondicional(data) {
      if (!data.tipoDocumento) {
        marcarInvalido(tipoDocumentoEl);
        return "Debe seleccionar el tipo de documento.";
      }

      if (!data.nombreMVP) {
        marcarInvalido(document.getElementById("nombreMVP"));
        return "El campo Nombre OCD es obligatorio.";
      }

      if (data.tipoDocumento === "OPENSSL_RENOVACION" || data.tipoDocumento === "PGP_RENOVACION") {
        if (!data.usuarios.length) {
          return "Debe agregar al menos un usuario.";
        }

        for (const [indice, usuario] of data.usuarios.entries()) {
          const fila = usuariosRowsEl.querySelectorAll(".usuario-row")[indice];
          const campos = [
            ["nombreEmpresa", ".empresa-input", "Empresa"],
            ["nombreUsuario", ".usuario-input", "Usuario FT"],
            ["nombreCertificado", ".certificado-input", "Certificado"],
            ["fechaVencimiento", ".fecha-vencimiento-input", "Fecha vencimiento"],
            ["fechaVencimientoAnterior", ".fecha-anterior-input", "Fecha anterior"]
          ];

          for (const [propiedad, selector, etiqueta] of campos) {
            if (!usuario[propiedad]) {
              marcarInvalido(fila.querySelector(selector));
              return `El campo ${etiqueta} es obligatorio en la fila ${indice + 1}.`;
            }
          }

          if (!tieneLongitudFechaValida(usuario.fechaVencimiento)) {
            marcarInvalido(fila.querySelector(".fecha-vencimiento-input"));
            return `La Fecha vencimiento debe tener 10 caracteres en la fila ${indice + 1}.`;
          }

          if (!tieneLongitudFechaValida(usuario.fechaVencimientoAnterior)) {
            marcarInvalido(fila.querySelector(".fecha-anterior-input"));
            return `La Fecha anterior debe tener 10 caracteres en la fila ${indice + 1}.`;
          }

        }
      }

      if (data.tipoDocumento === "CAMBIO_CREDENCIALES") {
        if (!data.nombreEmpresa) {
          marcarInvalido(document.getElementById("nombreEmpresa"));
          return "El campo Nombre Empresa es obligatorio.";
        }
        if (!data.nombreUsuario) {
          marcarInvalido(document.getElementById("nombreUsuario"));
          return "El campo Nombre Usuario FT es obligatorio.";
        }
      }

      return "";
    }

    function descargarArchivos(files) {
      for (const file of files) {
        const mimeType = file.mimetype || "application/vnd.openxmlformats-officedocument.wordprocessingml.document";
        const binary = atob(file.content_base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }

        const blob = new Blob([bytes], { type: mimeType });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = file.filename || "documento_h2h.docx";
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
      }
    }

    document.getElementById("btnAgregarUsuario").addEventListener("click", () => crearFilaUsuario());
    tipoDocumentoEl.addEventListener("change", ajustarFormularioPorTipo);

    limpiarUsuarios();
    ajustarFormularioPorTipo();

    document.getElementById("sterlingForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      limpiarValidaciones();
      mensajesEl.innerHTML = "";

      const btn = document.getElementById("btnGenerar");
      btn.disabled = true;
      btn.textContent = "Generando...";

      const data = {
        tipoDocumento: document.getElementById("tipoDocumento").value.trim(),
        nombreMVP: document.getElementById("nombreMVP").value.trim(),
        nombreEmpresa: document.getElementById("nombreEmpresa").value.trim(),
        nombreUsuario: document.getElementById("nombreUsuario").value.trim(),
        nombreCertificado: document.getElementById("nombreCertificado").value.trim(),
        fechaVencimiento: "",
        fechaVencimientoAnterior: "",
        commit: "",
        rutaBitbucket: "",
        usuarios: obtenerUsuarios()
      };

      const error = validarCondicional(data);
      if (error) {
        mostrarMensaje("warning", error);
        btn.disabled = false;
        btn.textContent = "Generar Word";
        return;
      }

      try {
        const response = await fetch("/guardar_h2h", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const body = await response.json();
        if (!response.ok) {
          throw new Error(body.message || "Error al generar el documento");
        }

        const files = Array.isArray(body.files) ? body.files : [];
        if (!files.length) {
          throw new Error("No se generaron archivos para descargar.");
        }

        descargarArchivos(files);
        mostrarMensaje("success", `Se generaron y descargaron ${files.length} documento(s) Word correctamente.`);
      } catch (err) {
        mostrarMensaje("danger", `No fue posible generar el documento: ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = "Generar Word";
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
