<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOH2H | En Construccion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      min-height: 100%;
    }
    body {
      background: linear-gradient(180deg, #f6f2eb 0%, #ece6dc 100%);
      color: #2d241b;
    }
    .app-shell {
      max-width: 980px;
    }
    .page-card {
      background: rgba(255, 252, 247, 0.92);
      border: 1px solid #dbcdbd;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 14px 40px rgba(81, 60, 31, 0.10);
    }
    .notice-card {
      background: #fffdf9;
      border: 1px solid #e6dacb;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
    }
    .notice-title {
      font-size: 2rem;
      font-weight: 800;
      color: #8c2f1c;
      margin-bottom: 8px;
    }
    .notice-text {
      margin: 0;
      font-size: 1.05rem;
      color: #5a4934;
      font-weight: 600;
    }
    .btn-back {
      min-height: 46px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.92rem;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container app-shell py-5">
    <div class="page-card">
      <div class="notice-card">
        <div class="notice-title">EN CONSTRUCCION</div>
        <p class="notice-text">Generacion de documento No Host To Host.</p>
      </div>

      <div class="mt-4">
        <a href="{{ url_for('index') }}" class="btn btn-secondary btn-back w-100">Volver al menu principal</a>
      </div>
    </div>
  </div>
</body>
</html>
