<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sofftek | FileTransfer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #e63946;
      --brand-dark: #bf2431;
      --bg: #f2f3f5;
      --ink: #1f2328;
      --muted: #6b7280;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Barlow", sans-serif;
      background: radial-gradient(circle at 10% 10%, #ffffff 0%, var(--bg) 48%, #e8eaee 100%);
      color: var(--ink);
    }

    .layout {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .header,
    .footer {
      background: linear-gradient(135deg, var(--brand) 0%, #f04452 100%);
      color: #fff;
      text-align: center;
      padding: 18px 12px;
    }

    .header h1 {
      margin: 0;
      letter-spacing: 0.3px;
      font-size: clamp(1.4rem, 2vw, 2rem);
      font-weight: 800;
    }

    .footer p {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
    }

    .main {
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .grid {
      width: min(1180px, 100%);
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(3, minmax(240px, 1fr));
    }

    .card-link {
      text-decoration: none;
      color: inherit;
      border-radius: 18px;
      background: var(--card);
      padding: 18px;
      min-height: 188px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 8px;
      border: 2px solid rgba(230, 57, 70, 0.16);
      box-shadow: 0 10px 24px rgba(20, 24, 29, 0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .card-link:hover {
      transform: translateY(-5px);
      border-color: rgba(230, 57, 70, 0.42);
      box-shadow: 0 16px 34px rgba(20, 24, 29, 0.12);
    }

    .icon {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: #fff;
    }

    .label {
      margin: 2px 0 0;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.4px;
      color: var(--brand-dark);
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 600;
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .card-link { min-height: 152px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <header class="header">
      <h1>Sofftek | FileTransfer</h1>
    </header>

    <main class="main">
      <section class="grid" aria-label="Modulos de FileTransfer">
        <a href="{{ url_for('listar_categoria', categoria='internas') }}" class="card-link">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 7h11"></path>
              <path d="M4 12h8"></path>
              <path d="M4 17h6"></path>
              <path d="M17 7l3 3-3 3"></path>
              <path d="M14 10h6"></path>
            </svg>
          </div>
          <h2 class="label">INTERNAS</h2>
          <p class="hint">Gestion de transferencias internas</p>
        </a>

        <a href="{{ url_for('listar_categoria', categoria='h2h') }}" class="card-link">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="6" width="7" height="12" rx="1.5"></rect>
              <rect x="14" y="6" width="7" height="12" rx="1.5"></rect>
              <path d="M10 12h4"></path>
              <path d="M12 10l2 2-2 2"></path>
            </svg>
          </div>
          <h2 class="label">H2H</h2>
          <p class="hint">Generacion de documentos host to host</p>
        </a>

        <a href="{{ url_for('listar_categoria', categoria='noh2h') }}" class="card-link">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 6h16"></path>
              <path d="M4 12h10"></path>
              <path d="M4 18h16"></path>
              <path d="M17 9l3 3-3 3"></path>
            </svg>
          </div>
          <h2 class="label">NOH2H</h2>
          <p class="hint">Generacion de documento No Host To Host</p>
        </a>
      </section>
    </main>

    <footer class="footer">
      <p>Version: 1.0</p>
    </footer>
  </div>
</body>
</html>
